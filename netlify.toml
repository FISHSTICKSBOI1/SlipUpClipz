[build]
  command = "npm run website:build"
  publish = "dist-website"
  functions = "netlify/functions"

[dev]
  command = "npm run website:dev"
  targetPort = 5174
  port = 8888
  autoLaunch = false
  framework = "#custom"

[[redirects]]
  from = "/download/latest"
  to = "/.netlify/functions/download-latest"
  status = 302
  force = true
